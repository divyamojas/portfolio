<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/D-logo-24px.jpeg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Theme -->
    <meta name="theme-color" content="#f59e0b" />

    <!-- Primary meta -->
    <title>Divyam Ojas — Senior Technical Support Engineer</title>
    <meta name="author" content="Divyam Ojas" />
    <meta
      name="description"
      content="Senior Technical Support Engineer at Sprinklr. Resolving complex production incidents on enterprise CCaaS and Conversational AI platforms. Backend foundation in Node.js, Java, and SQL/NoSQL databases."
    />
    <meta name="keywords" content="Divyam Ojas, Technical Support Engineer, Sprinklr, Node.js, React, MongoDB, PostgreSQL, Elasticsearch, CCaaS, Conversational AI" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Divyam Ojas — Senior Technical Support Engineer" />
    <meta
      property="og:description"
      content="Senior Technical Support Engineer at Sprinklr resolving production incidents on enterprise CCaaS and Conversational AI platforms."
    />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Divyam Ojas — Senior Technical Support Engineer" />
    <meta
      name="twitter:description"
      content="Senior Technical Support Engineer at Sprinklr. Backend: Node.js, Java, SQL/NoSQL."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Read theme before paint to avoid flash -->
    <script>
      (function () {
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
